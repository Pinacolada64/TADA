name: Server E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e:
    name: Run network E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f server/requirements.txt ]; then
            pip install -r server/requirements.txt
          fi

      - name: Run network E2E tests
        working-directory: server
        env:
          # ensure pytest won't buffer output (useful in CI logs)
          PYTHONUNBUFFERED: '1'
        run: |
          # Run only the focused E2E tests that start an in-process server
          pytest -q tests/test_network_e2e_real_login.py tests/test_network_e2e_reconnect.py tests/test_move_south_room1.py tests/test_abrupt_disconnect.py

      - name: Run diagnostic report on failure
        if: failure()
        working-directory: server
        run: |
          mkdir -p artifacts
          python diagnose_server.py --report > artifacts/diagnose_report.txt 2>&1 || true

      - name: Upload diagnostic report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnose-report
          path: server/artifacts/diagnose_report.txt

      - name: Upload test artifacts (player saves)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-run-server-files
          path: server/run/server
