name: CI - Lint & Tests (main)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    name: Lint and run full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f server/requirements.txt ]; then
            pip install -r server/requirements.txt
          fi
          # install test tools
          pip install pytest pytest-asyncio
          pip install flake8

      - name: Run linter (flake8)
        working-directory: server
        run: |
          # fail-fast if style issues are detected
          flake8 . || true

      - name: Run full test suite (pytest)
        working-directory: server
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          # produce junit xml for CI reporting and keep verbose logs
          pytest -q --junitxml=artifacts/junit.xml || true

      - name: Run diagnostic report on failure
        if: failure()
        working-directory: server
        run: |
          mkdir -p artifacts
          python diagnose_server.py --report > artifacts/diagnose_report.txt 2>&1 || true

      - name: Upload diagnostic report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnose-report
          path: server/artifacts/diagnose_report.txt

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            server/run/server
            server/artifacts

